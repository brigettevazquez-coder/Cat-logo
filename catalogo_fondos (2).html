<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda del Equipo 🏊 — Recaudación de Fondos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#0057b8;--blue-mid:#1a7fd4;--blue-light:#e0f0ff;--aqua:#00b4d8;--yellow:#ffd60a;
      --bg:#ffffff;--bg-card:#fff;--text:#0d1b2a;--text-2:#4a5568;--text-3:#8898aa;
      --border:rgba(0,87,184,.12);--border-h:rgba(0,87,184,.28);--radius:14px;--radius-sm:8px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#0d1b2a;--bg-card:#152338;--text:#e8f4fd;--text-2:#90aecb;--text-3:#5a7a99;
      --border:rgba(0,180,216,.15);--border-h:rgba(0,180,216,.35);
    }}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .hero{background:linear-gradient(135deg,#0057b8 0%,#00b4d8 100%);padding:2.5rem 1.5rem 3.5rem;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30 Q15 20 30 30 Q45 40 60 30' stroke='rgba(255,255,255,0.08)' stroke-width='2' fill='none'/%3E%3C/svg%3E") repeat;animation:wave 8s linear infinite}
    @keyframes wave{from{background-position:0 0}to{background-position:60px 0}}
    .hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;margin-bottom:1rem;letter-spacing:.06em;text-transform:uppercase}
    .hero h1{color:#fff;font-size:32px;font-weight:700;margin-bottom:.5rem;line-height:1.2}
    .hero h1 span{color:var(--yellow)}
    .hero p{color:rgba(255,255,255,.85);font-size:15px}
    .meta{display:flex;justify-content:center;gap:2rem;margin-top:1.25rem;flex-wrap:wrap}
    .meta-item{color:rgba(255,255,255,.8);font-size:13px;display:flex;align-items:center;gap:5px}
    .progress-wrap{margin-top:1.5rem}
    .progress-labels{display:flex;justify-content:space-between;color:rgba(255,255,255,.75);font-size:12px;margin-bottom:6px}
    .progress-bar{background:rgba(255,255,255,.25);border-radius:20px;height:10px;overflow:hidden}
    .progress-fill{background:var(--yellow);height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
    .page{max-width:900px;margin:0 auto;padding:0 1rem 3rem}
    .toolbar{display:flex;gap:8px;padding:1.25rem 0 1rem;flex-wrap:wrap;align-items:center}
    .filter-btn{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-2);display:flex;align-items:center;gap:6px;transition:all .18s;font-family:inherit}
    .filter-btn:hover{border-color:var(--blue-mid);color:var(--blue)}
    .filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:2rem}
    .card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:border-color .18s,transform .18s}
    .card:hover{border-color:var(--border-h);transform:translateY(-3px)}
    .card-img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:#f3f4f6;display:flex;align-items:center;justify-content:center}
    .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{padding:1rem;display:flex;flex-direction:column;gap:5px;flex:1}
    .card-cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--aqua)}
    .card-name{font-size:14px;font-weight:600;color:var(--text)}
    .card-desc{font-size:12px;color:var(--text-2);line-height:1.55;flex:1}
    .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .price{font-size:18px;font-weight:700;color:var(--blue)}
    .price span{font-size:12px;font-weight:400;color:var(--text-3)}
    .add-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);width:34px;height:34px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;font-family:inherit}
    .add-btn:hover{background:var(--blue-mid)}
    .add-btn:active{transform:scale(.9)}
    .cart-panel{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .cart-header{background:var(--blue-light);padding:1rem 1.25rem;border-bottom:1.5px solid var(--border)}
    .cart-header-title{font-size:15px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:8px}
    .cart-badge{background:var(--blue);color:#fff;font-size:11px;border-radius:20px;padding:2px 9px;font-weight:600}
    .cart-body{padding:1rem 1.25rem}
    .cart-empty{font-size:13px;color:var(--text-3);text-align:center;padding:1.5rem 0;display:flex;flex-direction:column;align-items:center;gap:8px}
    .cart-empty i{font-size:32px}
    .cart-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text);padding:9px 0;border-bottom:1px solid var(--border)}
    .cart-item:last-of-type{border-bottom:none}
    .cart-item-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .cart-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#eee}
    .cart-item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .qty-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background .1s;font-family:inherit}
    .qty-btn:hover{background:var(--blue-light);border-color:var(--blue)}
    .qty-num{font-size:13px;font-weight:600;min-width:20px;text-align:center}
    .item-subtotal{font-size:13px;font-weight:600;min-width:58px;text-align:right;color:var(--blue)}
    .cart-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding:14px;background:var(--blue-light);border-radius:var(--radius-sm)}
    .total-label{font-size:13px;color:var(--text-2);font-weight:500}
    .total-amount{font-size:24px;font-weight:700;color:var(--blue)}
    .name-section{margin-top:12px}
    .name-label{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;display:block}
    .name-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);transition:border-color .15s}
    .name-input:focus{outline:none;border-color:var(--blue)}
    .name-input::placeholder{color:var(--text-3)}
    .checkout-btn{width:100%;margin-top:12px;background:#25D366;color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s}
    .checkout-btn:hover{background:#1ebe5c}
    .checkout-btn:active{transform:scale(.98)}
    .toast{position:fixed;bottom:24px;right:24px;background:#0d1b2a;color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;display:flex;align-items:center;gap:8px}
    .toast.show{opacity:1}
    .card-img-wrap{cursor:zoom-in}
    .lightbox{
      position:fixed;inset:0;background:rgba(13,27,42,.92);
      display:none;align-items:center;justify-content:center;
      z-index:1000;padding:2rem;cursor:zoom-out;
      animation:fadeIn .2s ease;
    }
    .lightbox.show{display:flex}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .lightbox img{
      max-width:100%;max-height:100%;border-radius:var(--radius-sm);
      box-shadow:0 10px 40px rgba(0,0,0,.4);cursor:default;
    }
    .lightbox-close{
      position:absolute;top:20px;right:28px;color:#fff;font-size:36px;
      cursor:pointer;line-height:1;opacity:.8;transition:opacity .15s;
    }
    .lightbox-close:hover{opacity:1}
    @media(max-width:540px){.hero h1{font-size:24px}.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}.page{padding:0 .75rem 3rem}}
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge"><i class="ti ti-swimming"></i> Recaudación de fondos</div>
    <h1>Tiendita del Equipo 🏊‍♂️🏊🏼‍♀️</h1>
    <p>Este catálogo tiene un propósito especial.</p>
    <p style="margin-top:10px">Gracias por tu apoyo y por ayudarnos a compartir esta iniciativa. Cada compra cuenta. 🏊💙</p>
  </div>
</div>

<div class="page">
  <div class="toolbar">
    <button class="filter-btn active" onclick="filterCat('todos',this)"><i class="ti ti-layout-grid"></i> Todos</button>
    <button class="filter-btn" onclick="filterCat('Accesorios',this)"><i class="ti ti-swimming"></i> Accesorios</button>
    <button class="filter-btn" onclick="filterCat('Ropa',this)"><i class="ti ti-shirt"></i> Ropa</button>
  </div>
  <div class="grid" id="productGrid"></div>
  <div class="cart-panel">

    </div>
    <div class="cart-body">
      <div id="cartItems"><div class="cart-empty"><i class="ti ti-shopping-cart-off"></i>Aún no has agregado productos.</div></div>

      <div id="cartActions" style="display:none">
        <div class="name-section">
          <label class="name-label" for="buyerName">Tu nombre (para el pedido)</label>
          <input class="name-input" type="text" id="buyerName" placeholder="Ej. Ana García" />
        </div>
        <button class="checkout-btn" onclick="checkout()"><i class="ti ti-brand-whatsapp"></i> Enviar pedido por WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i> <span id="toastMsg"></span></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
</div>

  function openLightbox(src, name) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxImg').alt = name;

    grid.innerHTML = list.map(p => `
      <div class="card">
        <div class="card-img-wrap" onclick="openLightbox('${p.img}','${p.name}')"><img src="${p.img}" alt="${p.name}" loading="lazy" /></div>
        <div class="card-body">
          <span class="card-cat">${p.cat}</span>
          <span class="card-name">${p.name}</span>
          <span class="card-desc">${p.desc}</span>
          <div class="card-footer">
            <span class="price">$${p.price} <span>MXN</span></span>
            <button class="add-btn" onclick="addToCart(${p.id})">+</button>
          </div>
        </div>
      </div>`).join('');
  }

  function filterCat(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts();
  }

  function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    renderCart();
    showToast('¡Agregado al pedido!');
  }

  function changeQty(id, delta) {
    cart[id] = (cart[id] || 0) + delta;
    if (cart[id] <= 0) delete cart[id];
    renderCart();
  }

  function renderCart() {
    const items   = Object.entries(cart);
    const badge   = document.getElementById('cartBadge');
    const cartEl  = document.getElementById('cartItems');
    const totalEl = document.getElementById('cartTotal');
    const actEl   = document.getElementById('cartActions');
    const totalQty = items.reduce((s,[,q]) => s+q, 0);
    const totalAmt = items.reduce((s,[id,q]) => s + products.find(p=>p.id==id).price*q, 0);
    badge.textContent = totalQty;

    if (!items.length) {
      cartEl.innerHTML = '<div class="cart-empty"><i class="ti ti-shopping-cart-off"></i>Aún no has agregado productos.</div>';
      totalEl.style.display = 'none'; actEl.style.display = 'none'; return;
    }

    cartEl.innerHTML = items.map(([id,qty]) => {
      const p = products.find(x=>x.id==id);
      return `<div class="cart-item">
        <div class="cart-item-left">
          <img class="cart-thumb" src="${p.img}" alt="${p.name}" />
          <span class="cart-item-name">${p.name}</span>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
          <span class="item-subtotal">$${(p.price*qty).toLocaleString('es-MX')}</span>
        </div>
      </div>`;
    }).join('');

    totalEl.innerHTML = `<div class="cart-total"><span class="total-label">Total a pagar</span><span class="total-amount">$${totalAmt.toLocaleString('es-MX')}</span></div>`;
    totalEl.style.display = 'block'; actEl.style.display = 'block';
  }

  function checkout() {
    const name = document.getElementById('buyerName').value.trim();
    if (!name) { document.getElementById('buyerName').focus(); showToast('Por favor escribe tu nombre 😊'); return; }
    const items = Object.entries(cart);
    const amt   = items.reduce((s,[id,q]) => s + products.find(p=>p.id==id).price*q, 0);
    const lineas = items.map(([id,q]) => { const p=products.find(x=>x.id==id); return `• ${p.emoji} ${p.name} x${q}  —  $${(p.price*q).toLocaleString('es-MX')}`; });
    const mensaje = `¡Hola! 👋 Quiero hacer un pedido de la *Tienda del Equipo* 🏊\n\n*Nombre:* ${name}\n\n*Productos:*\n${lineas.join('\n')}\n\n*Total: $${amt.toLocaleString('es-MX')} MXN*\n\n¿Cómo coordino el pago y la entrega? 🙏`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(mensaje)}`, '_blank');
    cart = {}; document.getElementById('buyerName').value = '';
    renderCart(); showToast('¡Abriendo WhatsApp! 🎉');
  }

  let toastTimer;
  function showToast(msg) {
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2300);
  }

  renderProducts();
</script>
</body>
</html>
